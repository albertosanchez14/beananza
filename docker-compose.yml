services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  game-server:
    image: ghcr.io/albertosanchez14/beananza-server:latest
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
    environment:
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      ALLOWED_ORIGINS:
      LOG_LEVEL: info
      READ_BUFFER_SIZE: 1024
      WRITE_BUFFER_SIZE: 1024
      WS_SEND_BUFFER_SIZE: 256
      WS_RATE_LIMIT: 10
      WS_RATE_BURST: 20
      CARDS_PER_TURN: 2
      MAX_NUMBER_PLAYERS: 5
      MIN_NUMBER_PLAYERS: 3
      MAX_RESHUFFLES: 3
      CARDS_PER_DRAW: 3
      LOBBY_RESET_SECS: 30
      DISCONNECT_TIMEOUT_SECS: 60
      MAX_AVATAR_UPLOAD_BYTES: 2097152
      # STORAGE_BACKEND: local
      # AVATAR_UPLOAD_PREFIX: avatars
      # LOCAL_OBJECT_DIR: /app/uploads
      # LOCAL_PUBLIC_BASE_URL: /beananza-uploads
      STORAGE_BACKEND: s3
      S3_BUCKET: beananza-uploads
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
      S3_SESSION_TOKEN: ${S3_SESSION_TOKEN:-}
      S3_PUBLIC_BASE_URL: /beananza-uploads
      S3_FORCE_PATH_STYLE: "true"
      S3_ACL: ""
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # volumes:
    #   - uploads_data:/app/uploads
    #   # Adding other card configuration
    #   - ./game-server/cards.yaml:/app/config/cards.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  game-client:
    image: ghcr.io/albertosanchez14/beananza-client:latest
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      game-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: ghcr.io/albertosanchez14/beananza-nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      PORT: 80
      GAME_SERVER_HOST: game-server
      GAME_SERVER_PORT: 8080
      GAME_CLIENT_HOST: game-client
      GAME_CLIENT_PORT: 3000
      OBJECT_STORAGE_HOST: minio
      OBJECT_STORAGE_PORT: 9000
      NGINX_FORWARDED_PROTO: http
      # With TLS
      # PORT: 443
      # NGINX_ENABLE_SSL: "true"
      # NGINX_FORWARDED_PROTO: https
    depends_on:
      game-server:
        condition: service_healthy
      game-client:
        condition: service_healthy

volumes:
  redis_data:
  minio_data:
  # uploads_data:
