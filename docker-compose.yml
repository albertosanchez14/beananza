services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  game-server-1:
    build:
      context: ./game-server
      dockerfile: Dockerfile
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_DB=0
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - LOG_LEVEL=info
      - CARDS_PER_TURN=2
      - MAX_NUMBER_PLAYERS=5
      - MIN_NUMBER_PLAYERS=3
      - CARDS_CONFIG_PATH=/app/cards.yaml
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"

  game-server-2:
    build:
      context: ./game-server
      dockerfile: Dockerfile
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_DB=0
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - LOG_LEVEL=info
      - CARDS_PER_TURN=2
      - MAX_NUMBER_PLAYERS=5
      - MIN_NUMBER_PLAYERS=3
      - CARDS_CONFIG_PATH=/app/cards.yaml
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"

  game-client:
    build:
      context: ./game-client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_HOST=${HOST:-localhost}
    environment:
      - PORT=3000
    expose:
      - "3000"
    depends_on:
      - game-server-1
      - game-server-2

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      game-server-1:
        condition: service_started
      game-server-2:
        condition: service_started
      game-client:
        condition: service_started

volumes:
  redis_data:
