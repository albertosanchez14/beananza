services:
  redis:
    image: redis:7-alpine
    command:
      [
        "sh",
        "-c",
        'exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"',
      ]
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 5

  game-server:
    image: ${GAME_SERVER_IMAGE:-card-game-server}:${APP_TAG:-latest}
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 2
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDIS_DB: ${REDIS_DB:-0}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:-}
      LOG_LEVEL: info
      READ_BUFFER_SIZE: 1024
      WRITE_BUFFER_SIZE: 1024
      WS_SEND_BUFFER_SIZE: 256
      WS_RATE_LIMIT: 10
      WS_RATE_BURST: 20
      CARDS_PER_TURN: 2
      MAX_NUMBER_PLAYERS: 5
      MIN_NUMBER_PLAYERS: 3
      MAX_RESHUFFLES: 3
      CARDS_PER_DRAW: 3
      LOBBY_RESET_SECS: 30
      DISCONNECT_TIMEOUT_SECS: 60
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      # Adding other card configuration
      - ./game-server/cards.yaml:/app/config/cards.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  game-client:
    image: ${GAME_CLIENT_IMAGE:-card-game-client}:${APP_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      game-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      game-server:
        condition: service_healthy
      game-client:
        condition: service_healthy

volumes:
  redis_data:
  uploads_data:
