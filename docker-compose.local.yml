services:
  redis:
    ports:
      - "6379:6379"

  game-server:
    build:
      context: ./game-server
      dockerfile: Dockerfile

  game-client:
    build:
      context: ./game-client
      dockerfile: Dockerfile

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
