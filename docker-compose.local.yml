services:
  redis:
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-create-bucket:
    image: minio/mc:latest
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
      S3_BUCKET: beananza-uploads
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      'until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done;
      mc mb --ignore-existing "local/$$S3_BUCKET";
      mc anonymous set download "local/$$S3_BUCKET"'

  game-server:
    build:
      context: ./game-server
      dockerfile: Dockerfile
    environment:
      STORAGE_BACKEND: s3
      LOCAL_OBJECT_DIR:
      LOCAL_PUBLIC_BASE_URL:
      S3_BUCKET: beananza-uploads
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
      S3_SESSION_TOKEN: ${S3_SESSION_TOKEN:-}
      S3_PUBLIC_BASE_URL: /beananza-uploads
      S3_FORCE_PATH_STYLE: "true"
      S3_ACL: ""
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

  game-client:
    build:
      context: ./game-client
      dockerfile: Dockerfile

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro

volumes:
  minio_data:
