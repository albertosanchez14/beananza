services:
  game-server:
    environment:
      STORAGE_BACKEND: s3
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET in .env}
      S3_REGION: ${S3_REGION:?Set S3_REGION in .env}
      S3_ENDPOINT: ${S3_ENDPOINT:?Set S3_ENDPOINT in .env}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACL: ${S3_ACL:-public-read}

  nginx:
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
